name: Deploy Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'SnapEat-Backend/**' # Only triggers if backend code changes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x SnapEat-Backend/mvnw

      - name: Build with Maven
        run: |
          cd SnapEat-Backend
          bash ./mvnw clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "SnapEat-Backend/target/snapeat-backend.jar"
          target: "/home/ubuntu/snapeat/backend"
          strip_components: 2

      - name: Restart Backend Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Using the systemd service we discussed earlier
            sudo systemctl restart snapeat.service
