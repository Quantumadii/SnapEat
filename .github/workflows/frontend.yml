name: Deploy Frontend
on:
  push:
    branches: [ development ]
    paths:
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development

      - name: Install & Build
        run: |
          cd frontend
          npm install
          npm run build
          echo "=== Verifying build output ==="
          pwd
          ls -la dist/

      - name: Debug paths          # ← add this temporarily
        run: |
          echo "Runner PWD: $(pwd)"
          find . -path ./node_modules -prune -o -name "dist" -print
          ls -la frontend/dist/

      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/dist"     # ← no trailing slash, no glob
          target: "/var/www/html"
          strip_components: 2
