name: Deploy Frontend
on:
  push:
    branches: [ development ]
    paths:
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development

      - name: Install & Build
        run: |
          cd frontend
          npm install
          npm run build
          echo "=== Build output ==="
          ls -la dist/

      - name: Prepare dist for SCP
        run: |
          cp -r frontend/dist ./dist
          echo "=== Confirming copy ==="
          ls -la dist/

      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist"              # ← root-level folder, no ambiguity
          target: "/var/www/html"
          strip_components: 1
