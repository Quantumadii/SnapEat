<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
th:replace="email/layout :: layout(~{::body})">

<body>

<h2 style="margin-top:0;color:#1a1a1a;font-size:20px;">
Verify Your Email ✉️
</h2>

<p>
Hi <span th:text="${name}"></span>,
</p>

<p>
Use the OTP below to complete your <strong th:text="${appName}"></strong> registration.
</p>

<div style="margin:18px 0;padding:14px 16px;background:#fff4ee;border:1px dashed #ff6b35;border-radius:10px;text-align:center;">
<p style="margin:0 0 6px;color:#666;font-size:12px;letter-spacing:.08em;text-transform:uppercase;">One-Time Password</p>
<p style="margin:0;color:#ff6b35;font-size:30px;font-weight:800;letter-spacing:8px;" th:text="${otp}">123456</p>
</div>

<p style="margin:12px 0 0;color:#e74c3c;font-size:13px;">
This OTP expires in <strong>10 minutes</strong>.
</p>

<p style="margin-top:16px;color:#777;font-size:13px;">
If you did not request this, you can safely ignore this email.
</p>

</body>
</html>
