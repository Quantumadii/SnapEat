<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
</head>

<body style="margin:0;padding:0;background:#f5f5f5;font-family:Arial,sans-serif;">

<div th:fragment="layout(content)">

<div style="max-width:580px;margin:32px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.10);">

<div style="background:linear-gradient(135deg,#ff6b35,#ff8c42);padding:28px 32px;text-align:center;">

<h1 style="margin:0;color:#fff;font-size:24px;">
🍔 <span th:text="${appName}"></span>
</h1>

<p style="margin:4px 0 0;color:rgba(255,255,255,0.85);font-size:13px;">
Your favourite restaurant, online.
</p>

</div>



<div style="padding:32px;color:#333;font-size:15px;line-height:1.7;">

<div th:replace="${content}"></div>

</div>


<div style="background:#1c1c1c;color:#888;text-align:center;padding:18px;font-size:13px;">

© 2026 <span th:text="${appName}"></span>

</div>

</div>

</div>

</body>
</html>
