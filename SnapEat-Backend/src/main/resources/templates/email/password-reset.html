<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
th:replace="email/layout :: layout(~{::body})">

<body>

<h2 style="margin-top:0;color:#1a1a1a;font-size:20px;">
Password Reset 🔐
</h2>

<p>
Hi <span th:text="${name}"></span>,
</p>

<p>
Click the button below to reset your password.
</p>

<a th:href="${resetLink}"
style="display:inline-block;margin:18px 0;padding:13px 30px;background:#ff6b35;color:#fff!important;text-decoration:none;border-radius:8px;font-weight:700;font-size:15px;">
Reset Password →
</a>

<p style="color:#e74c3c;font-size:13px;">
This link expires in 1 hour.
</p>

</body>
</html>
